<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Management - Hostel Management System</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:#f0f2f5; color:#333; }
        .navbar { background:linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color:white; padding:15px 30px; display:flex; justify-content:space-between; align-items:center; }
        .navbar-brand { font-size:20px; font-weight:700; }
        .profile-pill { background:rgba(255,255,255,0.15); padding:8px 12px; border-radius:20px; }
        .main-container { display:flex; min-height:calc(100vh - 70px); }
        .sidebar { width:260px; background:white; border-right:1px solid #ddd; padding:20px 0; }
        .sidebar-title { font-size:11px; font-weight:700; color:#999; text-transform:uppercase; letter-spacing:0.8px; padding:0 20px; margin-bottom:10px; }
        .sidebar a { display:flex; align-items:center; gap:12px; padding:12px 20px; color:#555; text-decoration:none; transition:all 0.3s; border-left:3px solid transparent; }
        .sidebar a:hover, .sidebar a.active { background:#e8f0f7; color:#2a5298; border-left-color:#2a5298; }
        .content { flex:1; padding:30px; }
        .page-header { margin-bottom:25px; }
        .page-title { font-size:28px; font-weight:700; color:#1e3c72; margin-bottom:8px; }
        .page-subtitle { color:#666; font-size:14px; }
        .card { background:white; border-radius:12px; padding:20px; box-shadow:0 2px 8px rgba(0,0,0,0.08); margin-bottom:20px; }
        .card h3 { color:#1e3c72; margin-bottom:15px; }
        .form-grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:15px; }
        .form-group { display:flex; flex-direction:column; gap:6px; }
        .form-group label { font-size:13px; font-weight:600; color:#555; }
        .form-group input, .form-group select, .form-group textarea { padding:11px 12px; border:1px solid #ddd; border-radius:8px; font-size:14px; }
        .form-group textarea { min-height:80px; resize:vertical; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline:none; border-color:#2a5298; box-shadow:0 0 0 3px rgba(42,82,152,0.12); }
        .full-width { grid-column:1 / -1; }
        .btn-row { display:flex; gap:10px; margin-top:12px; }
        .btn-primary { background:linear-gradient(135deg, #667eea 0%, #764ba2 100%); color:white; border:none; padding:11px 16px; border-radius:8px; cursor:pointer; font-weight:600; }
        .btn-secondary { background:white; color:#2a5298; border:1px solid #2a5298; padding:11px 16px; border-radius:8px; cursor:pointer; font-weight:600; }
        .alert { display:none; padding:12px 14px; border-radius:8px; margin-bottom:15px; font-size:14px; }
        .alert.show { display:block; }
        .alert-success { background:#d4edda; color:#155724; }
        .alert-error { background:#f8d7da; color:#721c24; }
        table { width:100%; border-collapse:collapse; }
        th { background:#f5f7fa; padding:12px 14px; text-align:left; color:#666; font-size:12px; text-transform:uppercase; letter-spacing:0.5px; }
        td { padding:12px 14px; border-bottom:1px solid #f0f2f5; }
        tr:hover { background:#fafbfc; }
        .badge { padding:4px 10px; border-radius:20px; font-size:11px; font-weight:600; }
        .badge-available { background:#d4edda; color:#155724; }
        .badge-maintenance { background:#fff3cd; color:#856404; }
        .badge-occupied { background:#f8d7da; color:#721c24; }
        .delete-btn { color:#dc3545; background:none; border:none; cursor:pointer; font-weight:600; }
        @media (max-width:768px){ .form-grid{grid-template-columns:1fr;} .sidebar{width:220px;} .content{padding:15px;} }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">🏢 HMS - Room Management</div>
        <div class="profile-pill" id="profilePill">👤 Loading User...</div>
    </nav>

    <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-title">Main</div>
            <a href="dashboard.html">📊 Dashboard</a>
            <a href="students.html">👥 Students</a>
            <a href="rooms.html" class="active">🛏️ Rooms</a>
            <a href="allocations.html">📋 Allocations</a>
            <a href="payments.html">💰 Bed Payments</a>
            <a href="reports.html">📈 Reports</a>
        </aside>

        <main class="content">
            <div class="page-header">
                <h1 class="page-title">Room Management</h1>
                <p class="page-subtitle">Create and manage hostel rooms and their occupancy status.</p>
            </div>

            <div class="alert alert-success" id="successAlert"></div>
            <div class="alert alert-error" id="errorAlert"></div>

            <section class="card">
                <h3>Add New Room</h3>
                <form id="roomForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="block_name">Hostel Block</label>
                            <select id="block_name" name="block_name">
                                <option value="Batian">Batian Block (1 bed)</option>
                                <option value="Nelion">Nelion Block (2 beds)</option>
                                <option value="Lenana">Lenana Block (3 beds)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="room_number">Room Number</label>
                            <input id="room_number" name="room_number" placeholder="BAT-001, NEL-001, LEN-001" required>
                        </div>
                        <div class="form-group">
                            <label for="room_type">Room Type</label>
                            <input id="room_type" name="room_type" placeholder="Single / Double / Triple" required readonly>
                        </div>
                        <div class="form-group">
                            <label for="capacity">Capacity</label>
                            <input id="capacity" name="capacity" type="number" min="1" required readonly>
                        </div>
                        <div class="form-group">
                            <label for="current_occupancy">Current Occupancy</label>
                            <input id="current_occupancy" name="current_occupancy" type="number" min="0" value="0">
                        </div>
                        <div class="form-group">
                            <label for="status">Status</label>
                            <select id="status" name="status">
                                <option value="available">Available</option>
                                <option value="occupied">Occupied</option>
                                <option value="maintenance">Maintenance</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="floor">Floor</label>
                            <input id="floor" name="floor" type="number" min="1" value="1">
                        </div>
                        <div class="form-group full-width">
                            <label for="amenities">Amenities</label>
                            <textarea id="amenities" name="amenities" placeholder="Wi-Fi, bathroom, study desk..."></textarea>
                        </div>
                    </div>
                    <div class="btn-row">
                        <button class="btn-primary" type="submit">Save Room</button>
                        <button class="btn-secondary" type="button" onclick="resetForm()">Clear</button>
                    </div>
                </form>
            </section>

            <section class="card">
                <h3>Available Rooms</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Room #</th>
                            <th>Type</th>
                            <th>Capacity</th>
                            <th>Occupancy</th>
                            <th>Status</th>
                            <th>Floor</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="roomTableBody">
                        <tr><td colspan="7" style="text-align:center; color:#999;">Loading rooms...</td></tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <script>
        const form = document.getElementById('roomForm');
        const tableBody = document.getElementById('roomTableBody');
        const successAlert = document.getElementById('successAlert');
        const errorAlert = document.getElementById('errorAlert');

        const blockSelect = document.getElementById('block_name');
        const roomTypeInput = document.getElementById('room_type');
        const capacityInput = document.getElementById('capacity');
        const roomNumberInput = document.getElementById('room_number');

        // Verify session status
        async function checkAuth() {
            try {
                const response = await fetch('/api/auth/me');
                const data = await response.json();
                
                if (!data.success) {
                    window.location.href = 'index.html';
                    return;
                }
                
                document.getElementById('profilePill').textContent = `👤 ${data.user.fullName}`;
                applyBlockDefaults();
                loadRooms();
            } catch (err) {
                window.location.href = 'index.html';
            }
        }

        function showMessage(type, message) {
            if (type === 'success') {
                successAlert.textContent = message;
                successAlert.classList.add('show');
                errorAlert.classList.remove('show');
                setTimeout(() => successAlert.classList.remove('show'), 4000);
            } else {
                errorAlert.textContent = message;
                errorAlert.classList.add('show');
                successAlert.classList.remove('show');
                setTimeout(() => errorAlert.classList.remove('show'), 4000);
            }
        }

        function applyBlockDefaults() {
            const presets = {
                Batian: { type: 'Single', capacity: 1, prefix: 'BAT-' },
                Nelion: { type: 'Double', capacity: 2, prefix: 'NEL-' },
                Lenana: { type: 'Triple', capacity: 3, prefix: 'LEN-' }
            };
            const preset = presets[blockSelect.value] || presets.Batian;
            roomTypeInput.value = preset.type;
            capacityInput.value = preset.capacity;
            roomNumberInput.placeholder = `${preset.prefix}001`;
        }

        function resetForm() {
            form.reset();
            document.getElementById('status').value = 'available';
            document.getElementById('current_occupancy').value = '0';
            document.getElementById('floor').value = '1';
            applyBlockDefaults();
        }

        async function loadRooms() {
            try {
                const response = await fetch('/api/rooms');
                const data = await response.json();
                if (!data.success) throw new Error(data.message || 'Unable to load rooms');
                renderRooms(data.data || []);
            } catch (error) {
                tableBody.innerHTML = `<tr><td colspan="7" style="text-align:center; color:#dc3545;">${error.message}</td></tr>`;
            }
        }

        function renderRooms(rooms) {
            if (!rooms.length) {
                tableBody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:#999;">No rooms found.</td></tr>';
                return;
            }

            tableBody.innerHTML = rooms.map(room => `
                <tr>
                    <td>${room.room_number || '-'}</td>
                    <td>${room.room_type || '-'}</td>
                    <td>${room.capacity || '-'}</td>
                    <td>${room.current_occupancy || 0}</td>
                    <td><span class="badge badge-${room.status || 'available'}">${room.status || 'available'}</span></td>
                    <td>${room.floor || '-'}</td>
                    <td><button class="delete-btn" onclick="deleteRoom(${room.room_id})">Delete</button></td>
                </tr>
            `).join('');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(form);
            const payload = Object.fromEntries(formData.entries());
            try {
                const response = await fetch('/api/rooms', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                if (!data.success) throw new Error(data.message || 'Room creation failed');
                showMessage('success', 'Room saved successfully.');
                resetForm();
                await loadRooms();
            } catch (error) {
                showMessage('error', error.message);
            }
        });

        async function deleteRoom(roomId) {
            if (!confirm('Are you sure you want to delete this room?')) return;
            try {
                const response = await fetch(`/api/rooms?room_id=${roomId}`, {
                    method: 'DELETE'
                });
                const data = await response.json();
                if (!data.success) throw new Error(data.message || 'Delete failed');
                showMessage('success', 'Room deleted successfully.');
                await loadRooms();
            } catch (error) {
                showMessage('error', error.message);
            }
        }

        blockSelect.addEventListener('change', applyBlockDefaults);

        // Initialize check
        checkAuth();
    </script>
</body>
</html>

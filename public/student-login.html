<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Student Login - Everest University HMS</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#000666",
                        "primary-container": "#1a237e",
                        secondary: "#006a60",
                        "secondary-container": "#85f6e5",
                        background: "#fbf8ff",
                        surface: "#fbf8ff",
                        "on-surface": "#1b1b21",
                        outline: "#767683",
                        "outline-variant": "#c6c5d4"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gradient-to-tr from-[#002b28] via-[#004d47] to-[#006a60] text-white min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white/10 backdrop-blur-md border border-white/25 p-8 rounded-2xl shadow-2xl transition-all duration-300 hover:shadow-white/5">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-white/10 mb-4 text-3xl animate-pulse">
                🎓
            </div>
            <h1 class="text-3xl font-bold tracking-tight text-white">Student Portal</h1>
            <p class="text-sm text-teal-200 mt-1">Everest University Hostel Allocation & Booking</p>
        </div>

        <!-- Alerts -->
        <div class="hidden p-4 mb-4 text-sm rounded-lg bg-red-500/25 border border-red-500/50 text-red-200" id="alertError"></div>
        <div class="hidden p-4 mb-4 text-sm rounded-lg bg-green-500/25 border border-green-500/50 text-green-200" id="alertSuccess"></div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label for="admission_number" class="block text-xs font-semibold uppercase tracking-wider text-teal-200 mb-2">Admission Number</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-teal-300 text-lg">badge</span>
                    <input type="text" id="admission_number" name="admission_number" required 
                           class="w-full pl-10 pr-4 py-3 bg-white/5 border border-white/25 rounded-lg text-white placeholder-teal-300/50 focus:ring-2 focus:ring-teal-400 focus:border-transparent outline-none transition-all" 
                           placeholder="e.g., ADM001">
                </div>
            </div>

            <div>
                <label for="password" class="block text-xs font-semibold uppercase tracking-wider text-teal-200 mb-2">Password</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-teal-300 text-lg">lock</span>
                    <input type="password" id="password" name="password" required 
                           class="w-full pl-10 pr-12 py-3 bg-white/5 border border-white/25 rounded-lg text-white placeholder-teal-300/50 focus:ring-2 focus:ring-teal-400 focus:border-transparent outline-none transition-all" 
                           placeholder="Enter portal password">
                    <button type="button" id="passwordToggle" aria-label="Show password" 
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-teal-300 hover:text-white transition-colors focus:outline-none">
                        <span class="material-symbols-outlined text-lg">visibility</span>
                    </button>
                </div>
            </div>

            <!-- Loading Spinner -->
            <div class="hidden text-center py-2" id="loading">
                <div class="inline-block w-6 h-6 border-2 border-teal-400 border-t-transparent rounded-full animate-spin"></div>
                <p class="text-xs text-teal-200 mt-1">Verifying credentials...</p>
            </div>

            <div class="flex items-center justify-between text-sm">
                <div></div>
                <a href="javascript:void(0)" onclick="forgotPassword()" class="text-teal-300 hover:text-white hover:underline transition-colors font-medium">Forgot Password?</a>
            </div>

            <button type="submit" id="submitBtn" 
                    class="w-full py-3 px-4 bg-teal-600 hover:bg-teal-500 active:scale-[0.98] text-white font-semibold rounded-lg shadow-lg hover:shadow-teal-500/20 transition-all duration-150">
                Log In to Portal
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-white/10 text-center text-sm text-teal-200 space-y-2">
            <div>
                Don't have an account? <a href="student-register.html" class="text-teal-300 hover:text-white font-bold hover:underline transition-colors">Register here</a>
            </div>
            <div class="text-xs opacity-75">
                Admin? <a href="index.html" class="text-teal-300 hover:text-white hover:underline transition-colors">Admin login</a>
            </div>
        </div>
    </div>

    <script>
        // Check if already logged in and redirect to dashboard
        fetch('/api/auth/me')
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    if (data.user.role === 'student') {
                        window.location.href = 'student-dashboard.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                }
            })
            .catch(() => {});

        const loginForm = document.getElementById('loginForm');
        const alertError = document.getElementById('alertError');
        const alertSuccess = document.getElementById('alertSuccess');
        const loading = document.getElementById('loading');
        const submitBtn = document.getElementById('submitBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const admission_number = document.getElementById('admission_number').value.trim();
            const password = document.getElementById('password').value.trim();

            // Clear alerts
            alertError.classList.add('hidden');
            alertSuccess.classList.add('hidden');

            // Show loading
            loading.classList.remove('hidden');
            submitBtn.disabled = true;

            try {
                const response = await fetch('/api/student/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        admission_number: admission_number,
                        password: password
                    })
                });

                const data = await response.json();

                if (data.success) {
                    alertSuccess.textContent = data.message;
                    alertSuccess.classList.remove('hidden');
                    
                    setTimeout(() => {
                        window.location.href = 'student-dashboard.html';
                    }, 1500);
                } else {
                    alertError.textContent = data.message || 'Login failed';
                    alertError.classList.remove('hidden');
                }
            } catch (error) {
                alertError.textContent = 'Network error. Please try again.';
                alertError.classList.remove('hidden');
            } finally {
                loading.classList.add('hidden');
                submitBtn.disabled = false;
            }
        });

        const passwordToggle = document.getElementById('passwordToggle');
        const passwordInput = document.getElementById('password');

        passwordToggle.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            passwordToggle.querySelector('span').textContent = isPassword ? 'visibility_off' : 'visibility';
            passwordToggle.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
        });

        function forgotPassword() {
            alert('🔒 Reset Password Request:\nPlease visit the University Hostel Warden\'s office with your student ID card to verify your identity and reset your portal password.');
        }
    </script>
</body>
</html>

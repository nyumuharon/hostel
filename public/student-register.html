<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - Everest University HMS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .register-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 600px;
            padding: 40px;
        }

        .register-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .register-header h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 6px;
        }

        .brand-mark {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .register-header p {
            color: #666;
            font-size: 14px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: #555;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #1e3c72;
            box-shadow: 0 0 5px rgba(30, 60, 114, 0.1);
        }

        .btn-register {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 15px;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(30, 60, 114, 0.4);
        }

        .btn-register:active {
            transform: translateY(0);
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .footer-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #555;
        }

        .footer-link a {
            color: #1e3c72;
            text-decoration: none;
            font-weight: 600;
        }

        .footer-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <div class="brand-mark" aria-hidden="true">📝🎓</div>
            <h1>Create Student Account</h1>
            <p>Everest University Hostel Registration</p>
        </div>

        <div class="alert alert-error" id="alertError"></div>
        <div class="alert alert-success" id="alertSuccess"></div>

        <form id="registerForm">
            <div class="form-grid">
                <div class="form-group">
                    <label for="admission_number">Admission Number *</label>
                    <input type="text" id="admission_number" name="admission_number" required placeholder="e.g. ADM004">
                </div>

                <div class="form-group">
                    <label for="password">Password *</label>
                    <input type="password" id="password" name="password" required placeholder="Choose a password">
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm Password *</label>
                    <input type="password" id="confirm_password" name="confirm_password" required placeholder="Confirm your password">
                </div>

                <div class="form-group">
                    <label for="full_name">Full Name *</label>
                    <input type="text" id="full_name" name="full_name" required placeholder="Enter full name">
                </div>

                <div class="form-group">
                    <label for="gender">Gender *</label>
                    <select id="gender" name="gender" required>
                        <option value="">Select gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="student@example.com">
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number *</label>
                    <input type="tel" id="phone" name="phone" required placeholder="0712345678" pattern="[0-9]{10}" maxlength="10">
                </div>

                <div class="form-group full-width">
                    <label for="course">Course *</label>
                    <select id="course" name="course" required>
                        <option value="">Select course</option>
                        <option value="Software Engineering">Software Engineering</option>
                        <option value="IT">IT</option>
                        <option value="Medicine and Surgery">Medicine and Surgery</option>
                        <option value="Cosmetology">Cosmetology</option>
                        <option value="Hospitality">Hospitality</option>
                        <option value="Psychology">Psychology</option>
                        <option value="Education Arts">Education Arts</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="next_of_kin_name">Next of Kin Name</label>
                    <input type="text" id="next_of_kin_name" name="next_of_kin_name">
                </div>

                <div class="form-group">
                    <label for="next_of_kin_phone">Kin Phone Number</label>
                    <input type="tel" id="next_of_kin_phone" name="next_of_kin_phone" placeholder="0712345678">
                </div>
            </div>

            <button type="submit" class="btn-register" id="submitBtn">Register Account</button>
        </form>

        <p class="footer-link">
            Already have an account? <a href="student-login.html">Login here</a>
        </p>
    </div>

    <script>
        const registerForm = document.getElementById('registerForm');
        const alertError = document.getElementById('alertError');
        const alertSuccess = document.getElementById('alertSuccess');
        const submitBtn = document.getElementById('submitBtn');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;

            if (password !== confirmPassword) {
                alertError.textContent = 'Passwords do not match.';
                alertError.classList.add('show');
                return;
            }

            const formData = new FormData(registerForm);
            const payload = Object.fromEntries(formData.entries());

            // Clear alerts
            alertError.classList.remove('show');
            alertSuccess.classList.remove('show');
            submitBtn.disabled = true;

            try {
                const response = await fetch('/api/student/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (data.success) {
                    alertSuccess.textContent = data.message;
                    alertSuccess.classList.add('show');
                    
                    setTimeout(() => {
                        window.location.href = 'student-login.html';
                    }, 2000);
                } else {
                    alertError.textContent = data.message || 'Registration failed';
                    alertError.classList.add('show');
                    submitBtn.disabled = false;
                }
            } catch (error) {
                alertError.textContent = 'Network error. Please try again.';
                alertError.classList.add('show');
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>

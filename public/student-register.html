<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Student Registration - Everest University HMS</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#000666",
                        "primary-container": "#1a237e",
                        secondary: "#006a60",
                        "secondary-container": "#85f6e5",
                        background: "#fbf8ff",
                        surface: "#fbf8ff",
                        "on-surface": "#1b1b21",
                        outline: "#767683",
                        "outline-variant": "#c6c5d4"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gradient-to-tr from-[#002b28] via-[#004d47] to-[#006a60] text-on-surface min-h-screen flex items-center justify-center p-4 md:p-8">
    <div class="w-full max-w-3xl bg-white p-8 rounded-2xl shadow-2xl transition-all duration-300">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-teal-100 text-teal-700 mb-3 text-2xl">
                person_add
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-primary">Student Registration</h1>
            <p class="text-sm text-outline mt-1">Create your hostel management system student account</p>
        </div>

        <!-- Alerts -->
        <div class="hidden p-4 mb-6 text-sm rounded-lg bg-red-50 border border-red-200 text-red-700" id="alertError"></div>
        <div class="hidden p-4 mb-6 text-sm rounded-lg bg-green-50 border border-green-200 text-green-700" id="alertSuccess"></div>

        <form id="registerForm" class="space-y-6">
            <!-- Form Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                
                <!-- 1. Names Section -->
                <div>
                    <label for="first_name" class="block text-xs font-semibold uppercase tracking-wider text-outline mb-2">First Name *</label>
                    <input type="text" id="first_name" name="first_name" required 
                           class="w-full px-4 py-2.5 border border-outline-variant rounded-lg focus:ring-2 focus:ring-teal-600 focus:border-transparent outline-none transition-all placeholder:text-outline/50" 
                           placeholder="Enter first name">
                </div>

                <div>
                    <label for="second_name" class="block text-xs font-semibold uppercase tracking-wider text-outline mb-2">Second Name *</label>
                    <input type="text" id="second_name" name="second_name" required 
                           class="w-full px-4 py-2.5 border border-outline-variant rounded-lg focus:ring-2 focus:ring-teal-600 focus:border-transparent outline-none transition-all placeholder:text-outline/50" 
                           placeholder="Enter second name">
                </div>

                <div class="md:col-span-2">
                    <label for="surname" class="block text-xs font-semibold uppercase tracking-wider text-outline mb-2">Surname (Optional)</label>
                    <input type="text" id="surname" name="surname" 
                           class="w-full px-4 py-2.5 border border-outline-variant rounded-lg focus:ring-2 focus:ring-teal-600 focus:border-transparent outline-none transition-all placeholder:text-outline/50" 
                           placeholder="Enter surname">
                </div>

                <!-- 2. Admission and Gender -->
                <div>
                    <label for="admission_number" class="block text-xs font-semibold uppercase tracking-wider text-outline mb-2">Admission Number *</label>
                    <input type="text" id="admission_number" name="admission_number" required 
                           class="w-full px-4 py-2.5 border border-outline-variant rounded-lg focus:ring-2 focus:ring-teal-600 focus:border-transparent outline-none transition-all placeholder:text-outline/50" 
                           placeholder="e.g., ADM001">
                </div>

                <div>
                    <label for="gender" class="block text-xs font-semibold uppercase tracking-wider text-outline mb-2">Gender *</label>
                    <select id="gender" name="gender" required 
                            class="w-full px-4 py-2.5 border border-outline-variant rounded-lg focus:ring-2 focus:ring-teal-600 focus:border-transparent outline-none transition-all">
                        <option value="">Select Gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>

                <!-- 3. Contact Info -->
                <div>
                    <label for="phone" class="block text-xs font-semibold uppercase tracking-wider text-outline mb-2">Phone Number *</label>
                    <div class="flex rounded-lg border border-outline-variant overflow-hidden focus-within:ring-2 focus-within:ring-teal-600 focus-within:border-transparent transition-all" id="phoneWrap">
                        <span class="bg-teal-50 border-r border-outline-variant px-3 py-2.5 text-sm font-bold text-teal-800 select-none">+254</span>
                        <input type="tel" id="phone" name="phone" inputmode="numeric" maxlength="10" required 
                               class="w-full px-4 border-0 focus:ring-0 outline-none placeholder:text-outline/50" 
                               placeholder="0712345678" oninput="validatePhone(this)">
                    </div>
                    <span id="phoneHint" class="block text-[11px] mt-1 font-medium"></span>
                </div>

                <div>
                    <label for="email" class="block text-xs font-semibold uppercase tracking-wider text-outline mb-2">Email Address</label>
                    <input type="email" id="email" name="email" 
                           class="w-full px-4 py-2.5 border border-outline-variant rounded-lg focus:ring-2 focus:ring-teal-600 focus:border-transparent outline-none transition-all placeholder:text-outline/50" 
                           placeholder="student@example.com">
                </div>

                <!-- 4. Course and Password -->
                <div class="md:col-span-2">
                    <label for="course" class="block text-xs font-semibold uppercase tracking-wider text-outline mb-2">Course of Study *</label>
                    <select id="course" name="course" required 
                            class="w-full px-4 py-2.5 border border-outline-variant rounded-lg focus:ring-2 focus:ring-teal-600 focus:border-transparent outline-none transition-all">
                        <option value="">Select course</option>
                        <option value="Software Engineering">Software Engineering</option>
                        <option value="IT">IT</option>
                        <option value="Medicine and Surgery">Medicine and Surgery</option>
                        <option value="Cosmetology">Cosmetology</option>
                        <option value="Hospitality">Hospitality</option>
                        <option value="Psychology">Psychology</option>
                        <option value="Education Arts">Education Arts</option>
                    </select>
                </div>

                <div>
                    <label for="password" class="block text-xs font-semibold uppercase tracking-wider text-outline mb-2">Choose Password *</label>
                    <input type="password" id="password" name="password" required 
                           class="w-full px-4 py-2.5 border border-outline-variant rounded-lg focus:ring-2 focus:ring-teal-600 focus:border-transparent outline-none transition-all placeholder:text-outline/50" 
                           placeholder="Create portal password">
                </div>

                <div>
                    <label for="confirm_password" class="block text-xs font-semibold uppercase tracking-wider text-outline mb-2">Confirm Password *</label>
                    <input type="password" id="confirm_password" name="confirm_password" required 
                           class="w-full px-4 py-2.5 border border-outline-variant rounded-lg focus:ring-2 focus:ring-teal-600 focus:border-transparent outline-none transition-all placeholder:text-outline/50" 
                           placeholder="Re-enter password">
                </div>

                <!-- 5. Next of Kin -->
                <div>
                    <label for="next_of_kin_name" class="block text-xs font-semibold uppercase tracking-wider text-outline mb-2">Next of Kin Name</label>
                    <input type="text" id="next_of_kin_name" name="next_of_kin_name" 
                           class="w-full px-4 py-2.5 border border-outline-variant rounded-lg focus:ring-2 focus:ring-teal-600 focus:border-transparent outline-none transition-all placeholder:text-outline/50" 
                           placeholder="Enter next of kin full name">
                </div>

                <div>
                    <label for="next_of_kin_phone" class="block text-xs font-semibold uppercase tracking-wider text-outline mb-2">Next of Kin Phone Number</label>
                    <div class="flex rounded-lg border border-outline-variant overflow-hidden focus-within:ring-2 focus-within:ring-teal-600 focus-within:border-transparent transition-all" id="kinPhoneWrap">
                        <span class="bg-teal-50 border-r border-outline-variant px-3 py-2.5 text-sm font-bold text-teal-800 select-none">+254</span>
                        <input type="tel" id="next_of_kin_phone" name="next_of_kin_phone" inputmode="numeric" maxlength="10" 
                               class="w-full px-4 border-0 focus:ring-0 outline-none placeholder:text-outline/50" 
                               placeholder="0712345678" oninput="validateKinPhone(this)">
                    </div>
                    <span id="kinPhoneHint" class="block text-[11px] mt-1 font-medium"></span>
                </div>

            </div>

            <button type="submit" id="submitBtn" 
                    class="w-full mt-6 py-3 px-4 bg-teal-600 hover:bg-teal-500 active:scale-[0.98] text-white font-semibold rounded-lg shadow-lg hover:shadow-teal-500/20 transition-all duration-150 text-center">
                Register Account
            </button>
        </form>

        <p class="mt-8 text-center text-sm text-outline">
            Already have an account? <a href="student-login.html" class="text-teal-600 hover:text-teal-500 font-bold hover:underline transition-colors">Login here</a>
        </p>
    </div>

    <script>
        const registerForm = document.getElementById('registerForm');
        const alertError = document.getElementById('alertError');
        const alertSuccess = document.getElementById('alertSuccess');
        const submitBtn = document.getElementById('submitBtn');

        function validatePhone(input) {
            const hint = document.getElementById('phoneHint');
            const wrap = document.getElementById('phoneWrap');
            let raw = input.value.replace(/\D/g, '').slice(0, 10);
            input.value = raw;
            
            // reset border classes
            wrap.classList.remove('border-green-500', 'border-red-500', 'border-yellow-500');
            wrap.classList.add('border-outline-variant');

            let clean = raw.startsWith('0') ? raw.slice(1) : raw;

            if (raw.length === 0) {
                hint.textContent = '';
            } else if (raw.startsWith('0') ? !/^0[71]/.test(raw) : !/^[71]/.test(raw)) {
                hint.textContent = '⚠ Must start with 07, 01, 7 or 1';
                hint.style.color = '#ba1a1a';
                wrap.classList.remove('border-outline-variant');
                wrap.classList.add('border-red-500');
            } else if (clean.length < 9) {
                hint.textContent = `${raw.length}/${raw.startsWith('0') ? 10 : 9} digits entered`;
                hint.style.color = '#b8860b';
                wrap.classList.remove('border-outline-variant');
                wrap.classList.add('border-yellow-500');
            } else {
                hint.textContent = '✓ Valid  →  +254' + clean;
                hint.style.color = '#006a60';
                wrap.classList.remove('border-outline-variant');
                wrap.classList.add('border-green-500');
            }
        }

        function validateKinPhone(input) {
            const hint = document.getElementById('kinPhoneHint');
            const wrap = document.getElementById('kinPhoneWrap');
            let raw = input.value.replace(/\D/g, '').slice(0, 10);
            input.value = raw;
            
            // reset border classes
            wrap.classList.remove('border-green-500', 'border-red-500', 'border-yellow-500');
            wrap.classList.add('border-outline-variant');

            let clean = raw.startsWith('0') ? raw.slice(1) : raw;

            if (raw.length === 0) {
                hint.textContent = '';
            } else if (clean.length === 9) {
                hint.textContent = '✓ Valid  →  +254' + clean;
                hint.style.color = '#006a60';
                wrap.classList.remove('border-outline-variant');
                wrap.classList.add('border-green-500');
            } else {
                hint.textContent = `${raw.length}/${raw.startsWith('0') ? 10 : 9} digits`;
                hint.style.color = '#b8860b';
                wrap.classList.remove('border-outline-variant');
                wrap.classList.add('border-yellow-500');
            }
        }

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = document.getElementById('password').value.trim();
            const confirmPassword = document.getElementById('confirm_password').value.trim();

            if (!password) {
                alertError.textContent = 'Password cannot be empty or only spaces.';
                alertError.classList.remove('hidden');
                return;
            }

            if (password !== confirmPassword) {
                alertError.textContent = 'Passwords do not match.';
                alertError.classList.remove('hidden');
                return;
            }

            const formData = new FormData(registerForm);
            const payload = Object.fromEntries(formData.entries());

            // Combine name fields
            const first = (payload.first_name || '').trim();
            const second = (payload.second_name || '').trim();
            const sur = (payload.surname || '').trim();
            payload.full_name = [first, second, sur].filter(Boolean).join(' ');
            delete payload.first_name;
            delete payload.second_name;
            delete payload.surname;

            // Format phone with +254
            let rawPhone = (payload.phone || '').replace(/\D/g, '');
            if (rawPhone.startsWith('0')) rawPhone = rawPhone.slice(1);
            if (!rawPhone || !/^[71][0-9]{8}$/.test(rawPhone)) {
                alertError.textContent = 'Phone must be 9 digits (or 10 starting with 0) starting with 7 or 1.';
                alertError.classList.remove('hidden');
                return;
            }
            payload.phone = '+254' + rawPhone;
            payload.password = password;
            delete payload.confirm_password;

            let rawKin = (payload.next_of_kin_phone || '').replace(/\D/g, '');
            if (rawKin.startsWith('0')) rawKin = rawKin.slice(1);
            payload.next_of_kin_phone = rawKin ? '+254' + rawKin : '';

            // Clear alerts
            alertError.classList.add('hidden');
            alertSuccess.classList.add('hidden');
            submitBtn.disabled = true;

            try {
                const response = await fetch('/api/student/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (data.success) {
                    alertSuccess.textContent = data.message;
                    alertSuccess.classList.remove('hidden');
                    
                    setTimeout(() => {
                        window.location.href = 'student-login.html';
                    }, 2000);
                } else {
                    alertError.textContent = data.message || 'Registration failed';
                    alertError.classList.remove('hidden');
                    submitBtn.disabled = false;
                }
            } catch (error) {
                alertError.textContent = 'Network error. Please try again.';
                alertError.classList.remove('hidden');
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
